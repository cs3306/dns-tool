name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint-backend:
    name: Go Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - run: go vet ./...
        working-directory: dns-backend

  lint-middleware:
    name: Python Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt -q
        working-directory: dns-middleware/app
      - run: python -m py_compile app.py && echo "OK"
        working-directory: dns-middleware/app

  lint-frontend:
    name: Node Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm install --omit=dev
        working-directory: dns-frontend/app
