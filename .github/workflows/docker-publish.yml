name: Build & Push to Docker Hub

on:
  push:
    branches: [main]
    paths:
      - 'dns-frontend/**'
      - 'dns-middleware/**'
      - 'dns-backend/**'
      - 'docker-compose.yml'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:   # 允许手动触发

env:
  DOCKERHUB_USERNAME: cs3306

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push dns-backend
        uses: docker/build-push-action@v5
        with:
          context: ./dns-backend
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/dns-backend:latest
            ${{ env.DOCKERHUB_USERNAME }}/dns-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max

      - name: Build & Push dns-middleware
        uses: docker/build-push-action@v5
        with:
          context: ./dns-middleware/app
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/dns-middleware:latest
            ${{ env.DOCKERHUB_USERNAME }}/dns-middleware:${{ github.sha }}
          cache-from: type=gha,scope=middleware
          cache-to:   type=gha,scope=middleware,mode=max

      - name: Build & Push dns-frontend
        uses: docker/build-push-action@v5
        with:
          context: ./dns-frontend/app
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/dns-frontend:latest
            ${{ env.DOCKERHUB_USERNAME }}/dns-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max

      - name: Summary
        run: |
          echo "## 构建完成 🚀" >> $GITHUB_STEP_SUMMARY
          echo "| 镜像 | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| cs3306/dns-backend | latest, ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| cs3306/dns-middleware | latest, ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| cs3306/dns-frontend | latest, ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
